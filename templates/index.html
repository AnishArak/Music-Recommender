<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-music"></i>
                <span>AI Music Recommender</span>
            </div>
            <div class="nav-links">
                <a href="/" class="active">Home</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover Music You'll Love</h1>
            <p>Experience personalized music recommendations powered by AI and machine learning</p>

            <!-- Search Form -->
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="songSearch" placeholder="Enter a song name..." autocomplete="off">
                    <button id="searchBtn" class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div id="suggestions" class="suggestions"></div>
            </div>

            <!-- Mood Buttons -->
            <div class="mood-section">
                <h3>Or explore by mood:</h3>
                <div class="mood-buttons">
                    <button class="mood-btn" data-mood="happy">
                        <i class="fas fa-sun"></i> Happy
                    </button>
                    <button class="mood-btn" data-mood="sad">
                        <i class="fas fa-cloud-rain"></i> Sad
                    </button>
                    <button class="mood-btn" data-mood="chill">
                        <i class="fas fa-leaf"></i> Chill
                    </button>
                    <button class="mood-btn" data-mood="workout">
                        <i class="fas fa-dumbbell"></i> Workout
                    </button>
                    <button class="mood-btn" data-mood="romantic">
                        <i class="fas fa-heart"></i> Romantic
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Results Section -->
    <section class="results-section" id="resultsSection" style="display: none;">
        <div class="container">
            <div id="resultsContent"></div>
        </div>
    </section>

    <!-- Loading Spinner -->
    <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Finding your perfect songs...</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AI Music Recommender. Built with Flask & Machine Learning.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
